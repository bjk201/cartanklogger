<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CarTankLogger – Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <span class="navbar-brand mb-0 h1">⚡ CarTankLogger</span>
        <div>
            <a class="btn btn-outline-light btn-sm me-2" href="/admin">Verwaltung</a>
            <span class="badge bg-secondary" id="mockBadge" style="display:none">MOCK</span>
        </div>
    </div>
</nav>

<div class="container-fluid px-3 py-3">
    <div class="row mb-3">
        <div class="col-md-8">
            <h4 class="mb-0">Vollkosten-Auswertung</h4>
            <small class="text-muted" id="rangeLabel">Letzte 365 Tage</small>
        </div>
        <div class="col-md-4 text-md-end">
            <div class="btn-group btn-group-sm" role="group">
                <button class="btn btn-outline-secondary" data-days="90">90 T</button>
                <button class="btn btn-outline-secondary active" data-days="365">1 J</button>
                <button class="btn btn-outline-secondary" data-days="9999">All</button>
            </div>
        </div>
    </div>

    <!-- Summary cards -->
    <div class="row g-2 mb-3" id="summaryCards"></div>

    <!-- Charts -->
    <div class="row g-2 mb-3">
        <div class="col-lg-4">
            <div class="card h-100">
                <div class="card-header py-2">Energie nach Quelle</div>
                <div class="card-body"><canvas id="chartSource" height="220"></canvas></div>
            </div>
        </div>
        <div class="col-lg-8">
            <div class="card h-100">
                <div class="card-header py-2">Monatliche Kosten (Zuhause / Extern / Extra)</div>
                <div class="card-body"><canvas id="chartMonthly" height="220"></canvas></div>
            </div>
        </div>
    </div>

    <!-- Tabs -->
    <ul class="nav nav-tabs" id="dataTabs" role="tablist">
        <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#tabHome">Zuhause (EVCC)</button></li>
        <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#tabExt">Extern (TeslaMate)</button></li>
        <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#tabExtra">Extra-Kosten</button></li>
    </ul>
    <div class="tab-content">
        <div class="tab-pane fade show active" id="tabHome">
            <div class="table-responsive">
                <table class="table table-sm table-striped align-middle" id="tblHome">
                    <thead><tr>
                        <th>Datum</th><th>Ladepunkt</th><th>Fzg</th><th>kWh</th><th>PV%</th>
                        <th>Grid kWh</th><th>PV kWh</th><th>Grid €</th><th>PV €</th>
                        <th>Gesamt €</th><th>€/kWh</th><th>KM-Stand</th>
                    </tr></thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
        <div class="tab-pane fade" id="tabExt">
            <div class="table-responsive">
                <table class="table table-sm table-striped align-middle" id="tblExt">
                    <thead><tr>
                        <th>Datum</th><th>Ort</th><th>Anbieter</th><th>kWh</th>
                        <th>€ gesamt</th><th>€/kWh</th><th>KM-Stand</th><th>Aktion</th>
                    </tr></thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
        <div class="tab-pane fade" id="tabExtra">
            <div class="table-responsive">
                <table class="table table-sm table-striped align-middle" id="tblExtra">
                    <thead><tr>
                        <th>Datum</th><th>Kategorie</th><th>Beschreibung</th><th>€</th><th>KM-Stand</th>
                    </tr></thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>

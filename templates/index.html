{% extends "base.html" %}
{% block title %}CarTankLogger – Übersicht{% endblock %}
{% block content %}
<div class="row mb-3 align-items-center">
  <div class="col-md-6"><small class="text-muted" id="rangeLabel">Letzte 365 Tage</small></div>
  <div class="col-md-6 text-md-end">
    <div class="btn-group btn-group-sm" role="group">
      <button class="btn btn-outline-secondary" data-days="90">90 T</button>
      <button class="btn btn-outline-secondary active" data-days="365">1 J</button>
      <button class="btn btn-outline-secondary" data-days="9999">All</button>
    </div>
    <div class="input-group input-group-sm d-inline-flex ms-2" style="width:auto">
      <span class="input-group-text">Von</span>
      <input type="date" id="rangeFrom" class="form-control form-control-sm">
      <span class="input-group-text">Bis</span>
      <input type="date" id="rangeTo" class="form-control form-control-sm">
      <button class="btn btn-outline-primary" id="btnRange" type="button">Anwenden</button>
    </div>
  </div>
</div>

<div class="row g-2 mb-3" id="summaryCards"></div>

<div class="row g-2 mb-3">
  <div class="col-12">
    <div class="card h-100">
      <div class="card-header py-2">🔌 Letzte Ladevorgänge</div>
      <div class="card-body p-0">
        <div class="table-container">
          <table class="table table-sm table-striped align-middle mb-0" id="tblMerged">
            <thead class="sticky-header"><tr>
              <th>Datum</th><th>Stationen</th><th>Zuhause kWh</th><th>Zuhause €</th>
              <th>PV%</th><th>Ladeverlust</th><th>Extern kWh</th><th>Extern €</th>
              <th>Gesamt kWh</th><th>Gesamt €</th><th></th>
            </tr></thead><tbody></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="row g-2 mb-3" id="mergedKpis"></div>
<div class="row g-2 mb-3" id="tripCards"></div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="{{ url_for('static', filename='js/overview.js') }}?v={{ js_version }}"></script>
{% endblock %}

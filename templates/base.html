<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}CarTankLogger{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <meta name="csrf-token" content="">
    <style>
      .sidebar { min-height: calc(100vh - 80px); }
      .sidebar .nav-link { color: #64748b; border-radius: .375rem; margin-bottom: .25rem; }
      .sidebar .nav-link:hover { background: #f1f5f9; color: #0f172a; }
      .sidebar .nav-link.active { background: #2563eb; color: white; }
      [data-theme="dark"] .sidebar .nav-link { color: #cbd5e1; }
      [data-theme="dark"] .sidebar .nav-link:hover { background: #334155; color: #f1f5f9; }
      [data-theme="dark"] .sidebar .nav-link.active { background: #3b82f6; color: white; }
      [data-theme="dark"] .table { color: #e2e8f0 !important; background: #1e293b !important; }
      [data-theme="dark"] .card { background: #1e293b !important; border: 1px solid #475569 !important; }
      [data-theme="dark"] .card-header { background: #334155 !important; color: #f1f5f9 !important; }
      [data-theme="dark"] .form-control { background: #1e293b !important; color: #f1f5f9 !important; border-color: #475569 !important; }
      [data-theme="dark"] .form-select { background: #1e293b !important; color: #f1f5f9 !important; border-color: #475569 !important; }
      [data-theme="dark"] .form-check-input:checked { background-color: #2563eb; border-color: #2563eb; }
      
      /* Header - fix text visibility */
      .app-header {
        background: var(--bg-header, #f8fafc);
        border-bottom: 1px solid var(--border-color, #e2e8f0);
      }
      .app-header .navbar-brand {
        color: var(--text-primary, #0f172a) !important;
        font-weight: 700;
      }
      [data-theme="dark"] .app-header {
        background: var(--bg-header, #1e293b);
        border-bottom: 1px solid var(--border-color, #334155);
      }
      [data-theme="dark"] .app-header .navbar-brand {
        color: var(--text-primary, #f1f5f9) !important;
      }
    </style>
</head>
<body>

<header class="app-header">
  <div class="container-fluid px-3">
    <div class="d-flex align-items-center justify-content-between py-2">
      <span class="navbar-brand mb-0 h1">⚡ CarTankLogger</span>
      <div class="d-flex align-items-center gap-2">
        <span class="badge bg-secondary" id="mockBadge" style="display:none">MOCK</span>
      </div>
    </div>
  </div>
</header>

<div class="container-fluid">
  <div class="row">
    <!-- SIDEBAR -->
    <nav class="col-md-3 col-lg-2 col-xl-2 px-3 py-3">
      <ul class="nav flex-column sidebar">
        <li class="nav-item"><a class="nav-link {% if request.path == '/' %}active{% endif %}" href="/">📋 Übersicht</a></li>
        <li class="nav-item"><a class="nav-link {% if request.path == '/statistik' %}active{% endif %}" href="/statistik">📊 Statistik</a></li>
        <li class="nav-item"><a class="nav-link {% if request.path == '/evcc' %}active{% endif %}" href="/evcc">Zuhause (EVCC)</a></li>
        <li class="nav-item"><a class="nav-link {% if request.path == '/teslamate' %}active{% endif %}" href="/teslamate">Extern (TeslaMate)</a></li>
        <li class="nav-item"><a class="nav-link {% if request.path == '/extra' %}active{% endif %}" href="/extra">Extra-Kosten</a></li>
        <li class="nav-item"><a class="nav-link" href="/admin">⚙️ Verwaltung</a></li>
      </ul>
      
      <!-- Dark Mode Toggle at bottom of sidebar -->
      <div class="mt-auto pt-3 border-top">
        <button class="btn btn-outline-secondary w-100 btn-sm" id="themeToggle">
          <i class="bi bi-moon-fill me-2" id="themeIcon"></i>
          <span id="themeLabel">Dark Mode</span>
        </button>
      </div>
    </nav>

    <!-- MAIN CONTENT -->
    <main class="col-md-9 col-lg-10 col-xl-10 py-3">
      {% block content %}{% endblock %}
    </main>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.js"></script>
<script>
function initTheme() {
  const savedTheme = localStorage.getItem('theme');
  const themeToggle = document.getElementById('themeToggle');
  const themeIcon = document.getElementById('themeIcon');
  const themeLabel = document.getElementById('themeLabel');
  
  if (savedTheme === 'dark') {
    document.documentElement.setAttribute('data-theme', 'dark');
    themeIcon.className = 'bi bi-sun-fill me-2';
    themeLabel.textContent = 'Light Mode';
  }
  
  themeToggle.addEventListener('click', function() {
    const isDark = document.documentElement.getAttribute('data-theme') !== 'dark';
    document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
    localStorage.setItem('theme', isDark ? 'dark' : 'light');
    themeIcon.className = isDark ? 'bi bi-sun-fill me-2' : 'bi bi-moon-fill me-2';
    themeLabel.textContent = isDark ? 'Light Mode' : 'Dark Mode';
  });
}
document.addEventListener('DOMContentLoaded', initTheme);
</script>
{% block scripts %}{% endblock %}
</body>
</html>

{% extends "base.html" %}
{% block title %}CarTankLogger – Extra-Kosten{% endblock %}
{% block content %}
<div class="row mb-3 align-items-center">
  <div class="col-md-6"><small class="text-muted" id="rangeLabel">Letzte 365 Tage</small></div>
  <div class="col-md-6 text-md-end">
    <div class="btn-group btn-group-sm" role="group">
      <button class="btn btn-outline-secondary" data-days="90">90 T</button>
      <button class="btn btn-outline-secondary active" data-days="365">1 J</button>
      <button class="btn btn-outline-secondary" data-days="9999">All</button>
    </div>
    <div class="input-group input-group-sm d-inline-flex ms-2" style="width:auto">
      <span class="input-group-text">Von</span>
      <input type="date" id="rangeFrom" class="form-control form-control-sm">
      <span class="input-group-text">Bis</span>
      <input type="date" id="rangeTo" class="form-control form-control-sm">
      <button class="btn btn-outline-primary" id="btnRange" type="button">Anwenden</button>
    </div>
  </div>
</div>

<div class="card">
  <div class="card-header py-2">Extra-Kosten</div>
  <div class="card-body p-0">
    <div class="table-container">
      <table class="table table-sm table-striped align-middle mb-0" id="tblExtra">
        <thead class="sticky-header"><tr>
          <th>Datum</th><th>Kategorie</th><th>Beschreibung</th><th>€</th><th>KM-Stand</th><th>Aktion</th>
        </tr></thead><tbody></tbody>
      </table>
    </div>
  </div>
  <div class="card-footer py-2">
    <nav id="pagination" aria-label="Pagination"></nav>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/shared-modal.js') }}?v={{ js_version }}"></script>
<script src="{{ url_for('static', filename='js/extra.js') }}?v={{ js_version }}"></script>
{% endblock %}

# CarTankLogger – Docker Compose (Portainer-Stack via Git Repository)
#
# So einrichten in Portainer:
#   1) Stacks -> Add stack -> Repository (Git)
#   2) Repository URL: https://github.com/bjk201/cartanklogger.git
#   3) (optional) Authentication: GitHub-Token (Read-only reicht)
#   4) Compose path: docker-compose.yml
#   5) Deploy
#   -> Bei jedem "Update" pulled Portainer den neuen Code, baut neu, recreatet.
#
# WICHTIG zur Datenhaltung:
#   - ./data  ist deine PERSISTENTE Datenbank (SQLite) -> wird 1:1 gemountet.
#     Beim Recreate wird nichts ueberschrieben.
#   - ./config  ist dein Konfigurations-Verzeichnis. Die App legt darin
#     automatisch config.yaml an (falls nicht vorhanden, basierend auf
#     config.example.yaml). config.yaml ist in .gitignore und verlaesst
#     deinen Rechner nicht.
#   - WICHTIG: kein Datei-Mount (./config.yaml), sondern Verzeichnis-Mount!
#     Sonst erzeugt Docker aus ./config.yaml ein VERZEICHNIS und das Schreiben
#     der Config aus der UI scheitert mit "[Errno 21] Is a directory".
#   - Passe die Pfade ggf. an dein Arbeitsverzeichnis an (relativ zum Compose-File).

services:
  cartanklogger:
    build:
      context: .
      dockerfile: Dockerfile
      # BUILD_TIME wird NICHT als Arg uebergeben: Portainer wertet
      # "$(date +%s)" nicht aus und reicht den Literal-String durch.
      # Stattdessen setzt der entrypoint APP_VERSION auf die echte
      # Container-Startzeit (siehe entrypoint.sh) -> zuverlaessiger Cache-Buster.
    image: cartanklogger:latest
    ports:
      - "13131:5000"
    volumes:
      - ./data:/app/data
      - ./config:/app/config
    environment:
      - CONFIG_PATH=/app/config/config.yaml
      - DB_PATH=/app/data/cartanklogger.db
      - MOCK_MODE=${MOCK_MODE:-false}
    restart: unless-stopped

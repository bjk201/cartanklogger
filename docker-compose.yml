services:
  cartanklogger:
    image: cartanklogger:latest   # wird via 'docker build -t cartanklogger:latest .' gebaut
    container_name: cartanklogger
    ports:
      - "13131:5000"
    volumes:
      - ./config.yaml:/app/config.yaml
      - ./data:/app/data
    environment:
      - CONFIG_PATH=/app/config.yaml
      - DB_PATH=/app/data/cartanklogger.db
      - MOCK_MODE=${MOCK_MODE:-false}
    # EVCC läuft bei dir in einem eigenen LXC (eigene LAN-IP, NICHT Docker).
    # Deshalb ist KEIN gemeinsames Docker-Netz ("home-net") nötig:
    #   - gib in der Web-Oberfläche (Admin) einfach die LAN-IP deines EVCC
    #     ein, z.B. http-Host: 192.168.1.x , Port 7070
    #   - TeslaMate: falls als Docker-Container erreichbar, dessen Container-Name
    #     oder LAN-IP eintragen (z.B. http://192.168.1.y:4000/api)
    restart: unless-stopped

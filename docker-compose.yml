services:
  cartanklogger:
    build: .
    container_name: cartanklogger
    ports:
      - "13131:5000"
    volumes:
      - ./config.yaml:/app/config.yaml
      - ./data:/app/data
    environment:
      - CONFIG_PATH=/app/config.yaml
      - DB_PATH=/app/data/cartanklogger.db
      - MOCK_MODE=false
    # Mit dem Netzwerk verbinden, in dem EVCC + TeslaMate laufen:
    networks:
      - home-net
    restart: unless-stopped

# Erstelle dieses Netzwerk und stelle sicher, dass deine evcc- und teslamate-
# Container ebenfalls in "home-net" hängen (docker network connect home-net <container>).
# Alternativ: netzwerk-Modus "host" unten aktivieren und in config.yaml
# Hostnamen wie "192.168.x.x" oder "host.docker.internal" nutzen.
#    network_mode: host

networks:
  home-net:
    name: home-net
    external: true   # muss bereits existieren: docker network create home-net

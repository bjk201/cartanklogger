# Derzeit nur der minimale `docker-compose.yml`-Einstiegspunkt – keine Image-Referenzen für evcc/teslamate.
# Verwenden Sie nur den CartankLogger-Container, der bereits die vollständige Bearbeitungs-/CSRF-Backend-Funktionalität enthält.
# Verwenden Sie die `.env`-Datei für optionale Umgebungsvariablen wie MOCK_MODE, SECRET_KEY, TZ usw.

version: "3.9"

services:
  cartanklogger:
    build: .
    container_name: cartanklogger
    ports:
      - "13131:5000"
    volumes:
      - ./data:/app/data
    environment:
      # App-Konfiguration – Werte werden aus .env bezogen, falls vorhanden
      - CONFIG_PATH=/app/config.yaml
      - DB_PATH=/app/data/cartanklogger.db
      - MOCK_MODE=${MOCK_MODE:-false}
      - TZ=${TZ:-Europe/Berlin}
      - SECRET_KEY=${SECRET_KEY:-}
    restart: unless-stopped
    networks:
      - internal

volumes:
  cartanklogger_data:

networks:
  internal:
    driver: bridge
